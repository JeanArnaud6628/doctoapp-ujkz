<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoctoApp UJKZ</title>
  <style>
    body { margin:0; background:#1A5C2A; display:flex; justify-content:center; align-items:center; height:100vh; }
    #loading { color:white; font-family:sans-serif; text-align:center; }
  </style>
  <script>
    // 🔥 SIMULER PASSKEYS AVANT TOUT
    window.corbado = {
      passkeys: {
        init: function() { return Promise.resolve({}); },
        signIn: function() { return Promise.resolve({}); },
        signUp: function() { return Promise.resolve({}); }
      }
    };
    window.Passkeys = window.corbado.passkeys;

    // 🔥 CHARGER FLUTTER MANUELLEMENT
    window.addEventListener('load', function() {
      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    });
  </script>
</head>
<body>
<div id="loading">DoctoApp UJKZ<br>Chargement...</div>
</body>
</html>
