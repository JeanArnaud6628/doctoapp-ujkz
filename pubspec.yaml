name: doctapp
description: "DoctotApp UJKZ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  file_picker: ^10.3.3
  image_picker: ^1.2.2
  intl: ^0.20.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ✅ DEPENDENCY_OVERRIDES ICI (en dehors de flutter)
dependency_overrides:
  passkeys: any
  passkeys_android: any
  passkeys_darwin: any
  passkeys_doctor: any
  passkeys_platform_interface: any
  passkeys_web: any
  passkeys_windows: any

flutter:
  uses-material-design: true